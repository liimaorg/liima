<div class="properties-list">
  <div class="properties-column">
    @for (property of listProperties().left; track property.descriptorId) {
      <ng-container
        [ngTemplateOutlet]="propertyField"
        [ngTemplateOutletContext]="{ property: property }"
      ></ng-container>
    }
  </div>

  <div class="properties-column">
    @for (property of listProperties().right; track property.descriptorId) {
      <ng-container
        [ngTemplateOutlet]="propertyField"
        [ngTemplateOutletContext]="{ property: property }"
      ></ng-container>
    }
  </div>
</div>

<ng-template #propertyField let-property="property">
  <app-property-field
    [property]="property"
    [mode]="mode()"
    [resetToken]="resetToken()"
    [hideTooltip]="property.valueComment === 'staticProperty'"
    [canEdit]="canEdit()"
    [canDecrypt]="canDecrypt()"
    [canDelete]="canDelete()"
    (valueChange)="valueChange.emit({ name: property.name, value: $event })"
    (resetChange)="resetToggled.emit({ name: property.name, checked: $event })"
    (validationChange)="validationChanged.emit({ name: property.name, invalid: $event })"
    (editClicked)="editClicked.emit({ id: property.descriptorId })"
    (deleteClicked)="deleteClicked.emit({ id: property.descriptorId })"
  ></app-property-field>
</ng-template>
