<app-loading-indicator [isLoading]="isLoading()"></app-loading-indicator>
<app-tile-component
  [title]="'Related Resource Types'"
  [actionName]="'Add Relation'"
  [canAction]="false"
  [isCollapsed]="false"
  [noContent]="!hasRelations()"
  [notAllowed]="false"
>
  @if (hasRelations()) {
    <div class="relations-layout">
      <div class="relations-container">
        <app-relation-group
          [title]="'Unresolved'"
          [items]="unresolvedItems()"
          [selectedKey]="activeRelationId()"
          (itemSelected)="onItemSelected($event)"
        />
      </div>
      @if (selectedRelation(); as rel) {
        <div class="relation-detail-panel">
          <div class="relation-detail-header">
            <h4 class="relation-detail-title">{{ rel.name }}</h4>
            <app-button [variant]="'danger'" [size]="'sm'" [disabled]="true"
              ><app-icon icon="trash"></app-icon> Remove Relation</app-button
            >
          </div>
          <div class="relation-detail-body">
            <app-properties-panel [canEdit]="false">
              <app-properties-list
                [properties]="properties()"
                [mode]="'resourceType'"
                [canEdit]="false"
                [canDelete]="false"
                [resetToken]="resetToken()"
                (resetToggled)="onPropertyReset($event.name, $event.checked)"
                (validationChanged)="onPropertyValidationChange($event.name, $event.invalid)"
              ></app-properties-list>
            </app-properties-panel>
          </div>
        </div>
      }
    </div>
  }
</app-tile-component>
