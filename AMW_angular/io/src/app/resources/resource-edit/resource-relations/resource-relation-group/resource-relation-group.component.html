@if (items().length > 0) {
  <div class="relations-section">
    <h3 class="section-title">{{ title() }}</h3>
    <div class="relations-list">
      @for (item of items(); track item.key) {
        <div class="relation-item" [class.relation-item--unresolved]="item.unresolved">
          <div class="relation-info">
            <div class="relation-name">{{ item.name }}</div>
            <div class="relation-details">
              <span class="relation-type">{{ item.type }}</span>
              @if (item.release) {
                <span class="relation-separator">•</span>
                <span class="relation-release">{{ item.release }}</span>
              }
              @if (item.identifier) {
                <span class="relation-separator">•</span>
                <span class="relation-identifier">{{ item.identifier }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
}
